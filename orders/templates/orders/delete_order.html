{% extends "base.html" %}

{% block content %}
<div class="container section">
  <h2>Delete Order</h2>

  <p>
    Are you sure you want to delete <strong>Order #{{ order.id }}</strong>?
  </p>

  <p>
    <strong>{{ order.type|title }} ({{ order.size }})</strong><br>
    {{ order.description|default:"No description" }}
  </p>

  <form method="post">
    {% csrf_token %}

    <button type="submit" class="btn btn-danger">
      Yes, Delete
    </button>

    <a href="{% url 'orders:my_orders' %}" class="btn btn-secondary">
      Cancel
    </a>
  </form>
</div>
{% endblock %}
