{% extends "base.html" %}
{% block content %}
<div class="container section">
  <h2>Edit Order</h2>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    {% if form.errors %}
      <div class="alert alert-danger">
        {{ form.errors }}
      </div>
    {% endif %}

    <div class="mb-3">
      <label>Type</label>
      {{ form.type }}
    </div>

    <div class="mb-3">
      <label>Size</label>
      {{ form.size }}
    </div>

    <div class="mb-3">
      <label>Description</label>
      {{ form.description }}
    </div>

    <div class="mb-3">
      <label>Upload Design File</label>

      {% if order.design_file %}
        <p>
          <strong>Current file:</strong><br>
          <a href="{{ order.design_file.url }}" download>
            {{ order.design_file.name }}
          </a>
        </p>
      {% endif %}

      <input type="file" name="design_file" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">Update Order</button>
    <a href="{% url 'orders:my_orders' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
