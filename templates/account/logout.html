{% extends "base.html" %}

{% block content %}
<div class="container section text-center">

  <h2 class="mb-4">Sign Out</h2>

  <div class="card p-4 shadow-sm mx-auto" style="max-width: 400px;">
    <p class="mb-4">Are you sure you want to sign out?</p>

    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      
      <button type="submit" class="btn btn-danger w-100 mb-2">
        Sign Out
      </button>
    </form>

    <a href="{% url 'orders:my_orders' %}" class="btn btn-secondary w-100">
      Cancel
    </a>
  </div>

</div>
{% endblock %}
